# ============================================================
#  SERVER
# ============================================================
server.port=8080

# ============================================================
#  DATABASE MYSQL
#  ► Cambia "esame-schema" col nome del tuo schema
#  ► createDatabaseIfNotExist=true crea lo schema automaticamente
#  ► ddl-auto=update crea/aggiorna le tabelle automaticamente
#  ► Cambia username e password secondo il tuo MySQL locale
# ============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/esame-schema?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ============================================================
#  LOGGING
# ============================================================
logging.level.com.template=DEBUG